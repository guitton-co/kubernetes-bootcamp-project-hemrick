# Airflow values for the bootcamp data-pipeline example.
# We deploy the official apache-airflow/airflow chart (writing your own
# Airflow chart would be madness) and point it at the Postgres WE deployed.
#
# Contrast with apps/postgres: simple thing -> write the chart yourself;
# complex thing -> use a community chart and learn its values.

# DEMO secrets only. Generate your own for anything real:
#   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
fernetKey: aERBZE5MN3E0TjRjU2xzQWxCdTNIUks0WGFTZThoWXc=
webserverSecretKey: aERBZE5MN3E0TjRjU2xzQWxCdTNIUks0WGFTZThoWXc=

# Use the Postgres we manage in apps/postgres instead of the chart's bundled one.
postgresql:
  enabled: false

data:
  metadataConnection:
    user: airflow
    pass: airflow
    protocol: postgresql
    host: postgres-service   # matches apps/postgres/values.yaml service.name
    port: 5432
    db: airflow
    sslmode: disable

# On a small local cluster, LocalExecutor avoids running Redis + Celery workers.
# Comment this out to fall back to the chart default (CeleryExecutor).
executor: LocalExecutor

# Shared cohort Airflow — pulls DAGs from the org's main repo (public).
# Students do NOT redeploy this Airflow; they reference the shared instance
# and drop new DAGs by opening a PR against examples/data-pipeline/dags/
# (Louis merges → gitSync picks up within ~60s).
dags:
  gitSync:
    enabled: true
    repo: https://github.com/guitton-co/kubernetes-bootcamp.git
    branch: main
    rev: HEAD
    depth: 1
    maxFailures: 0
    subPath: "examples/data-pipeline/dags"

# Schedule ALL Airflow components onto the dedicated `airflow-pool` node
# (labeled dedicated=airflow, tainted dedicated=airflow:NoSchedule). The 3
# student nodes (s-1vcpu-2gb each) stay clear for student workloads.
nodeSelector:
  dedicated: airflow
tolerations:
  - key: dedicated
    operator: Equal
    value: airflow
    effect: NoSchedule

# Even on a beefier s-2vcpu-4gb node, Airflow 3.x boot is slow. Keep the
# relaxed probe budgets so we don't fight the chart during startup.
apiServer:
  startupProbe:
    timeoutSeconds: 30
    failureThreshold: 30   # 30 * 10s = 300s

scheduler:
  startupProbe:
    timeoutSeconds: 30
    failureThreshold: 30
  livenessProbe:
    timeoutSeconds: 60

dagProcessor:
  livenessProbe:
    timeoutSeconds: 60

triggerer:
  livenessProbe:
    timeoutSeconds: 60
