apiVersion: v1
kind: ResourceQuota
metadata:
  name: cohort-quota
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "25"
    persistentvolumeclaims: "5"
    services.loadbalancers: "0"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: cohort-defaults
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
